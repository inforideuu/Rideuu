<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background deep dark gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0b1329" />
    </linearGradient>
    
    <!-- Neon primary yellow/amber speed trail -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#facc15" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>
    
    <!-- Neon secondary speed trail -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    
    <!-- Soft glow filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="4" />

  <!-- Speed lines in background -->
  <g opacity="0.15">
    <line x1="50" y1="120" x2="320" y2="120" stroke="#facc15" stroke-width="4" stroke-linecap="round" />
    <line x1="120" y1="180" x2="420" y2="180" stroke="#ec4899" stroke-width="6" stroke-linecap="round" />
    <line x1="80" y1="360" x2="380" y2="360" stroke="#3b82f6" stroke-width="5" stroke-linecap="round" />
    <line x1="180" y1="420" x2="450" y2="420" stroke="#facc15" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- Glowing Outer Speed Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#accentGrad)" stroke-width="8" stroke-dasharray="600 400" stroke-linecap="round" filter="url(#neonGlow)" transform="rotate(-45 256 256)" opacity="0.85" />

  <!-- stylized SPEEDWING N Emblem -->
  <g filter="url(#neonGlow)">
    <!-- Right leg speed wing -->
    <path d="M 280,360 L 390,180 C 400,165 385,150 365,150 L 260,150 L 260,250 Z" fill="url(#accentGrad)" opacity="0.9" />
    
    <!-- Left leg speed wing -->
    <path d="M 232,152 L 122,332 C 112,347 127,362 147,362 L 252,362 L 252,262 Z" fill="url(#primaryGrad)" />
    
    <!-- Connecting central dynamic bar (Stylizing the N) -->
    <path d="M 252,262 L 260,250 L 375,160 C 385,152 388,168 375,182 L 280,360 Z" fill="#ffffff" />
  </g>

  <!-- Brand Speed dots -->
  <circle cx="380" cy="120" r="10" fill="#facc15" filter="url(#neonGlow)" />
  <circle cx="132" cy="392" r="8" fill="#ec4899" filter="url(#neonGlow)" />
</svg>
